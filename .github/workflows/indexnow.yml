name: Ping IndexNow on deploy

# Tells Bing (and other IndexNow search engines) that pages changed,
# right after each push to master. The key is public by design — it is
# served at /1f49a01e5abd4912ac89b688421ae948.txt on the live site.

on:
  push:
    branches: [master]

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Vercel deploy to go live
        run: sleep 120

      - name: Submit sitemap URLs to IndexNow
        run: |
          curl -s https://cafedelightco.com/sitemap.xml \
            | grep -o '<loc>[^<]*</loc>' \
            | sed -e 's/<loc>//' -e 's|</loc>||' \
            | python3 -c '
          import json, sys
          urls = [u.strip() for u in sys.stdin if u.strip().startswith("https://")]
          print(json.dumps({
            "host": "cafedelightco.com",
            "key": "1f49a01e5abd4912ac89b688421ae948",
            "keyLocation": "https://cafedelightco.com/1f49a01e5abd4912ac89b688421ae948.txt",
            "urlList": urls,
          }))' > payload.json
          code=$(curl -s -o response.txt -w '%{http_code}' -X POST 'https://api.indexnow.org/indexnow' \
            -H 'Content-Type: application/json; charset=utf-8' -d @payload.json)
          echo "IndexNow HTTP $code"
          cat response.txt
          [ "$code" = "200" ] || [ "$code" = "202" ]
